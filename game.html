<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학기 중 취미 추천 | 게임</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="nav">
    <div class="nav-container">
      <a href="main.html" class="nav-logo">🍀숨쉴 취미.zip</a>
      <ul class="nav-menu">
        <li><a href="main.html">메인</a></li>
        <li><a href="team.html">팀원소개</a></li>
        <li><a href="game.html" class="active">게임</a></li>
        <li><a href="form.html">폼</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="container">

      <section>
        <h1 class="section-title" style="font-size: 2rem;"><span style="color: #4DB190;">이모티콘 취미</span> 맞추기</h1>
        <p class="section-subtitle">조합을 보고 어떤 학기 중 취미인지 맞춰보세요</p>
      </section>

      <section id="game-section" style="max-width: 700px; margin: 2rem auto 0;">
        <div class="game-header">
          <span>라운드 <strong id="round-num">1</strong> / <strong id="total-rounds">7</strong></span>
          <span class="score">점수 <strong id="score">0</strong>점</span>
        </div>

        <div class="emoji-display">
          <div class="emoji-combo" id="emoji-combo"></div>
          <p class="emoji-question">이 조합은 어떤 취미일까요?</p>
        </div>

        <div class="choices" id="choices"></div>

        <div class="feedback" id="feedback">보기를 선택하면 정답·오답 피드백이 표시됩니다</div>

        <div class="game-actions">
          <button class="btn btn-outline" id="next-btn" style="display:none;">다음 라운드 →</button>
        </div>
      </section>

      <section id="result-section" style="display:none; max-width:700px; margin: 2rem auto 0;">
        <div class="game-result-box">
          <p class="result-grade-label">학기 중 취미 이해도</p>
          <h2 id="grade"></h2>
          <p class="result-score-text">총점 <strong id="final-score">0</strong>점 / <strong id="max-score">70</strong>점</p>
          <a href="form.html" class="btn" style="margin-top: 2rem; display: inline-block;">내 취미 찾으러 가기 →</a>
        </div>
      </section>

    </div>
  </main>

  <footer class="footer">
    <p>© 2026 학기 중 취미 추천 · 웹클라이언트컴퓨팅 01분반 · 숨쉴 취미.zip</p>
  </footer>

  <script src="game.js"></script>
</body>
</html>
